<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미스틱 타로 · 라이더-웨이트 타로점</title>
<meta name="description" content="라이더-웨이트 메이저 아르카나 22장으로 보는 온라인 타로점. 카드를 섞고 뽑아 정방향·역방향 해석을 확인하세요.">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0613;
  --bg2: #140b26;
  --panel: rgba(28, 18, 52, 0.72);
  --border: rgba(196, 160, 92, 0.35);
  --gold: #d9b466;
  --gold-bright: #f5d98a;
  --purple: #8b5cf6;
  --purple-deep: #4c1d95;
  --text: #e8e2f5;
  --muted: #9a8fb8;
  --reverse: #e06b6b;
  --shadow: 0 18px 50px rgba(0,0,0,0.55);
}

html, body { min-height: 100%; }

body {
  background:
    radial-gradient(1200px 700px at 50% -10%, #2a1758 0%, transparent 60%),
    radial-gradient(900px 600px at 80% 110%, #1c0f3a 0%, transparent 55%),
    linear-gradient(160deg, var(--bg) 0%, var(--bg2) 100%);
  background-attachment: fixed;
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* twinkling starfield */
.stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.star {
  position: absolute;
  width: 2px; height: 2px;
  background: #fff;
  border-radius: 50%;
  opacity: 0.6;
  animation: twinkle 3.5s infinite ease-in-out;
}
@keyframes twinkle { 0%,100% { opacity: 0.15; transform: scale(0.8); } 50% { opacity: 0.95; transform: scale(1.25); } }

.wrap {
  position: relative;
  z-index: 1;
  max-width: 1040px;
  margin: 0 auto;
  padding: 32px 18px 80px;
}

/* ── Header ── */
header { text-align: center; padding: 26px 0 14px; }
.title {
  font-family: "Noto Serif KR", "Times New Roman", serif;
  font-size: clamp(28px, 6vw, 46px);
  letter-spacing: 6px;
  font-weight: 700;
  background: linear-gradient(180deg, var(--gold-bright), var(--gold) 60%, #9a7b34);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 2px 24px rgba(217,180,102,0.25);
}
.subtitle { margin-top: 10px; color: var(--muted); letter-spacing: 3px; font-size: clamp(11px, 2.6vw, 13px); }
.divider {
  width: 120px; height: 1px; margin: 18px auto;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  position: relative;
}
.divider::after {
  content: "✦"; position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
  color: var(--gold); font-size: 13px; background: transparent;
}

.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 26px 24px;
  margin-top: 22px;
  backdrop-filter: blur(8px);
  box-shadow: var(--shadow);
}

/* ── Step: setup ── */
.label { display: block; color: var(--gold); letter-spacing: 2px; font-size: 13px; margin-bottom: 10px; font-weight: 600; }
.q-input {
  width: 100%;
  background: rgba(10,6,19,0.6);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  padding: 14px 16px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.q-input::placeholder { color: var(--muted); }
.q-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(217,180,102,0.15); }

.spreads { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-top: 22px; }
.spread {
  background: rgba(10,6,19,0.5);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 16px;
  cursor: pointer;
  transition: transform .18s, border-color .2s, background .2s;
  text-align: center;
}
.spread:hover { transform: translateY(-3px); border-color: var(--gold); }
.spread.active { border-color: var(--gold); background: linear-gradient(180deg, rgba(139,92,246,0.18), rgba(76,29,149,0.12)); box-shadow: 0 0 0 1px var(--gold) inset, 0 0 24px rgba(139,92,246,0.25); }
.spread .ico { font-size: 26px; margin-bottom: 8px; }
.spread .nm { font-weight: 700; letter-spacing: 1px; margin-bottom: 4px; }
.spread .ds { font-size: 12px; color: var(--muted); line-height: 1.5; }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  background: linear-gradient(180deg, var(--gold-bright), var(--gold));
  color: #2a1a05;
  border: none;
  border-radius: 999px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 800;
  letter-spacing: 2px;
  padding: 14px 38px;
  cursor: pointer;
  transition: transform .15s, box-shadow .2s, filter .2s;
  box-shadow: 0 8px 26px rgba(217,180,102,0.32);
}
.btn:hover { transform: translateY(-2px); filter: brightness(1.06); box-shadow: 0 12px 32px rgba(217,180,102,0.45); }
.btn:active { transform: translateY(0); }
.btn.ghost {
  background: transparent; color: var(--gold);
  border: 1px solid var(--border); box-shadow: none; font-weight: 700;
}
.btn.ghost:hover { border-color: var(--gold); background: rgba(217,180,102,0.08); }
.center { text-align: center; margin-top: 26px; }
.hint { color: var(--muted); font-size: 13px; letter-spacing: 1px; margin-top: 14px; min-height: 18px; }

/* ── Step: pick ── */
.deck-fan {
  position: relative;
  display: flex; flex-wrap: wrap; justify-content: center;
  gap: 6px;
  margin: 10px auto 4px;
  max-width: 920px;
}
.deck-card {
  width: 66px; height: 110px;
  border-radius: 8px;
  cursor: pointer;
  position: relative;
  flex: 0 0 auto;
  transition: transform .2s ease, box-shadow .2s;
  background:
    repeating-linear-gradient(45deg, rgba(255,255,255,0.04) 0 6px, transparent 6px 12px),
    radial-gradient(circle at 50% 35%, #3a2470, #1a0f38 70%);
  border: 1px solid var(--gold);
  box-shadow: 0 6px 16px rgba(0,0,0,0.5);
  overflow: hidden;
}
.deck-card::before {
  content: "✶";
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--gold); font-size: 22px; opacity: 0.7;
  text-shadow: 0 0 12px rgba(217,180,102,0.6);
}
.deck-card::after {
  content: ""; position: absolute; inset: 5px; border: 1px solid rgba(217,180,102,0.4); border-radius: 5px;
}
.deck-card:hover { transform: translateY(-14px); box-shadow: 0 14px 26px rgba(139,92,246,0.5); z-index: 5; }
.deck-card.chosen { transform: translateY(-22px); pointer-events: none; opacity: 0.25; }
.deck-card.dealing { animation: deal .5s ease both; }
@keyframes deal { from { opacity: 0; transform: translateY(40px) scale(0.7); } to { opacity: 1; transform: translateY(0) scale(1); } }

/* ── Step: result ── */
.results { display: flex; flex-wrap: wrap; justify-content: center; gap: 26px; margin-top: 6px; }
.result-card { width: 230px; max-width: 78vw; }
.slot-name { text-align: center; color: var(--gold); letter-spacing: 3px; font-size: 13px; font-weight: 700; margin-bottom: 12px; text-transform: uppercase; }

.card-flip { perspective: 1200px; width: 100%; aspect-ratio: 280/480; cursor: pointer; }
.card-inner { position: relative; width: 100%; height: 100%; transition: transform .8s cubic-bezier(.2,.8,.2,1); transform-style: preserve-3d; }
.card-flip.flipped .card-inner { transform: rotateY(180deg); }
.card-face {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.card-back {
  border: 1px solid var(--gold);
  background:
    repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 0 8px, transparent 8px 16px),
    radial-gradient(circle at 50% 35%, #3a2470, #1a0f38 70%);
  display: flex; align-items: center; justify-content: center;
}
.card-back .glyph { color: var(--gold); font-size: 46px; opacity: 0.8; text-shadow: 0 0 18px rgba(217,180,102,0.7); }
.card-back::after { content: ""; position: absolute; inset: 8px; border: 1px solid rgba(217,180,102,0.4); border-radius: 9px; }
.card-front {
  transform: rotateY(180deg);
  background: #f3ead6;
  border: 1px solid var(--gold);
  display: flex; align-items: center; justify-content: center;
}
.card-front img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card-front.reversed img { transform: rotate(180deg); }

/* image fallback tile */
.fallback {
  width: 100%; height: 100%;
  display: none;
  flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 14px;
  background: radial-gradient(circle at 50% 30%, #2a1758, #120a28);
  color: var(--gold);
}
.fallback .f-num { font-size: 13px; letter-spacing: 2px; opacity: 0.7; }
.fallback .f-glyph { font-size: 54px; margin: 12px 0; }
.fallback .f-name { font-size: 15px; font-weight: 700; letter-spacing: 1px; }
.card-front.show-fallback img { display: none; }
.card-front.show-fallback .fallback { display: flex; }

.card-meta { text-align: center; margin-top: 14px; }
.card-meta .cn-name { font-family: "Noto Serif KR", serif; font-size: 20px; font-weight: 700; color: var(--gold-bright); }
.card-meta .en-name { font-size: 12px; letter-spacing: 2px; color: var(--muted); margin-top: 2px; }
.orient {
  display: inline-block; margin-top: 10px; padding: 4px 14px; border-radius: 999px;
  font-size: 12px; font-weight: 700; letter-spacing: 2px;
}
.orient.up { background: rgba(139,92,246,0.22); color: #c4b5fd; border: 1px solid rgba(139,92,246,0.5); }
.orient.rev { background: rgba(224,107,107,0.18); color: var(--reverse); border: 1px solid rgba(224,107,107,0.5); }

.keywords { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-top: 12px; }
.kw { font-size: 11px; padding: 3px 10px; border-radius: 999px; background: rgba(217,180,102,0.12); border: 1px solid var(--border); color: var(--gold); letter-spacing: 1px; }

.interp { margin-top: 14px; font-size: 14px; line-height: 1.7; color: var(--text); text-align: left; }
.interp .ttl { display:block; color: var(--gold); font-weight: 700; letter-spacing: 1px; font-size: 12px; margin-bottom: 4px; }

/* overall summary */
.summary { margin-top: 28px; }
.summary .interp { text-align: center; }

footer { text-align: center; margin-top: 50px; color: var(--muted); font-size: 12px; line-height: 1.8; }
footer a { color: var(--gold); text-decoration: none; }
footer a:hover { text-decoration: underline; }

.hidden { display: none !important; }

.fade-in { animation: fadeIn .5s ease both; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

.topnav { position: absolute; top: 18px; right: 18px; z-index: 2; }
.topnav a { color: var(--muted); font-size: 12px; letter-spacing: 1px; text-decoration: none; border: 1px solid var(--border); padding: 6px 12px; border-radius: 999px; }
.topnav a:hover { color: var(--gold); border-color: var(--gold); }

@media (max-width: 520px) {
  .deck-card { width: 52px; height: 86px; }
  .result-card { width: 180px; }
}
</style>
</head>
<body>
<div class="stars" id="stars" aria-hidden="true"></div>
<div class="topnav"><a href="index.html">← 오디오 믹서</a></div>

<div class="wrap">
  <header>
    <div class="title">MYSTIC TAROT</div>
    <div class="subtitle">라이더 · 웨이트 메이저 아르카나 22</div>
    <div class="divider"></div>
  </header>

  <!-- STEP 1: SETUP -->
  <section id="step-setup" class="panel fade-in">
    <label class="label" for="question">🔮 마음속 질문을 떠올려 보세요</label>
    <input id="question" class="q-input" type="text" maxlength="80" placeholder="예) 이번 달 나의 연애운은 어떨까요?" autocomplete="off">

    <label class="label" style="margin-top:24px;">스프레드 선택</label>
    <div class="spreads" id="spreads">
      <div class="spread active" data-count="1" data-key="one">
        <div class="ico">🃏</div>
        <div class="nm">원 카드</div>
        <div class="ds">오늘의 메시지<br>한 장으로 보는 핵심</div>
      </div>
      <div class="spread" data-count="3" data-key="three">
        <div class="ico">🕯️</div>
        <div class="nm">쓰리 카드</div>
        <div class="ds">과거 · 현재 · 미래<br>흐름을 읽는 정석 배열</div>
      </div>
      <div class="spread" data-count="3" data-key="situation">
        <div class="ico">⚖️</div>
        <div class="nm">상황 · 행동 · 결과</div>
        <div class="ds">고민의 해법<br>지금 무엇을 할까</div>
      </div>
    </div>

    <div class="center">
      <button class="btn" id="toShuffle">카드 섞기 ✦</button>
    </div>
  </section>

  <!-- STEP 2: PICK -->
  <section id="step-pick" class="panel fade-in hidden">
    <label class="label" id="pickLabel" style="text-align:center;">카드를 섞는 중...</label>
    <div class="deck-fan" id="deckFan"></div>
    <div class="hint" id="pickHint" style="text-align:center;"></div>
    <div class="center">
      <button class="btn ghost" id="restartPick">처음으로</button>
    </div>
  </section>

  <!-- STEP 3: RESULT -->
  <section id="step-result" class="hidden">
    <div class="panel fade-in">
      <div id="readQ" class="label" style="text-align:center; margin-bottom:6px;"></div>
      <div class="subtitle" id="spreadName" style="margin-bottom:22px;"></div>
      <div class="results" id="results"></div>
    </div>

    <div class="panel summary fade-in" id="summaryPanel">
      <div class="label" style="text-align:center;">✦ 종합 메시지 ✦</div>
      <div class="interp" id="summaryText"></div>
    </div>

    <div class="center">
      <button class="btn" id="again">다시 보기 🔮</button>
    </div>
  </section>

  <footer>
    <div>카드 이미지 출처: 라이더 · 웨이트 · 스미스 타로 (1909, 퍼블릭 도메인) · Wikimedia Commons</div>
    <div>본 타로점은 오락 및 자기성찰 목적으로 제공됩니다. 무작위로 카드가 추첨됩니다.</div>
  </footer>
</div>

<script>
/* ───────────────── 별 배경 생성 ───────────────── */
(function makeStars(){
  const sky = document.getElementById('stars');
  const n = 90;
  let html = '';
  for (let i=0;i<n;i++){
    const x = Math.random()*100, y = Math.random()*100;
    const d = (Math.random()*4).toFixed(2);
    const s = (Math.random()*1.6+0.6).toFixed(2);
    html += `<div class="star" style="left:${x}%;top:${y}%;animation-delay:${d}s;width:${s}px;height:${s}px"></div>`;
  }
  sky.innerHTML = html;
})();

/* ───────────────── 메이저 아르카나 22장 데이터 ─────────────────
   img: 위키미디어 공용 라이더-웨이트 파일 (퍼블릭 도메인)
   해석문은 일반적인 타로 상징을 바탕으로 직접 작성. */
const FILEPATH = "https://commons.wikimedia.org/wiki/Special:FilePath/";
function img(file){ return FILEPATH + encodeURIComponent(file) + "?width=500"; }

const CARDS = [
  { n:0,  ko:"바보", en:"The Fool", glyph:"🌅", file:"RWS_Tarot_00_Fool.jpg",
    up:{ kw:["새로운 시작","자유","순수","모험"], txt:"낭떠러지 앞에서도 두려움 없이 첫발을 내딛는 카드입니다. 계산보다 직관을, 안정보다 가능성을 믿어야 할 때예요. 무모해 보여도 지금의 설렘을 따라가면 전혀 새로운 길이 열립니다." },
    rev:{ kw:["무모함","경솔","망설임","현실도피"], txt:"열정이 준비 부족으로 흐를 수 있습니다. 충동적인 결정이나 책임 회피를 경계하세요. 시작하기 전에 한 번 더 발밑을 살피라는 신호입니다." } },
  { n:1,  ko:"마법사", en:"The Magician", glyph:"✨", file:"RWS_Tarot_01_Magician.jpg",
    up:{ kw:["창조력","의지","실현","자신감"], txt:"필요한 재료는 이미 당신 손안에 모두 있습니다. 의지와 집중을 하나로 모으면 생각을 현실로 끌어내는 힘이 발휘돼요. 지금은 망설일 때가 아니라 행동으로 증명할 때입니다." },
    rev:{ kw:["속임수","미숙","낭비된 재능","조작"], txt:"재능을 엉뚱한 곳에 쓰거나, 스스로 혹은 타인의 말에 속고 있지는 않은지 돌아보세요. 자신감이 과장과 허세로 흐르면 기회를 놓칩니다." } },
  { n:2,  ko:"여사제", en:"The High Priestess", glyph:"🌙", file:"RWS_Tarot_02_High_Priestess.jpg",
    up:{ kw:["직관","비밀","내면","잠재의식"], txt:"드러나지 않은 진실이 수면 아래에서 흐르고 있습니다. 말과 논리보다 직관과 꿈, 조용한 내면의 목소리에 귀를 기울이세요. 지금은 행동보다 통찰의 시간입니다." },
    rev:{ kw:["감춰진 진실","혼란","무시된 직감"], txt:"내면의 신호를 외면하거나 비밀이 부담이 되고 있습니다. 표면적인 정보에만 휘둘리면 본질을 놓칠 수 있어요. 마음의 소리를 다시 들어보세요." } },
  { n:3,  ko:"여황제", en:"The Empress", glyph:"🌷", file:"RWS_Tarot_03_Empress.jpg",
    up:{ kw:["풍요","모성","창조","사랑"], txt:"씨앗이 열매로 영그는 풍요의 카드입니다. 사랑, 보살핌, 창작, 물질적 안정이 무르익습니다. 자신과 주변을 너그럽게 가꿀수록 더 크게 돌아옵니다." },
    rev:{ kw:["집착","과보호","정체","자기소홀"], txt:"베풂이 지나쳐 집착이 되거나, 정작 자신을 돌보지 못하고 있습니다. 창조의 흐름이 막혀 답답할 수 있어요. 균형과 자기돌봄이 필요합니다." } },
  { n:4,  ko:"황제", en:"The Emperor", glyph:"🏛️", file:"RWS_Tarot_04_Emperor.jpg",
    up:{ kw:["권위","안정","질서","책임"], txt:"확고한 원칙과 체계로 상황을 다스리는 카드입니다. 리더십을 발휘하고 구조를 세우면 든든한 토대가 만들어집니다. 책임감 있는 결단이 신뢰를 부릅니다." },

const SPREADS = {
  one:       { name:"원 카드 · 오늘의 메시지", slots:["메시지"] },
  three:     { name:"쓰리 카드 · 과거 / 현재 / 미래", slots:["과거","현재","미래"] },
  situation: { name:"상황 / 행동 / 결과", slots:["상황","행동","결과"] },
};

/* ───────────────── 상태 & 요소 ───────────────── */
let selected = { count:1, key:"one" };
let drawn = [];           // [{card, reversed, slot}]
let pickTarget = 1;
let picks = [];

const $ = id => document.getElementById(id);
const stepSetup = $("step-setup"), stepPick = $("step-pick"), stepResult = $("step-result");

/* 스프레드 선택 */
document.querySelectorAll(".spread").forEach(el => {
  el.addEventListener("click", () => {
    document.querySelectorAll(".spread").forEach(s => s.classList.remove("active"));
    el.classList.add("active");
    selected = { count: +el.dataset.count, key: el.dataset.key };
  });
});

/* 섞기 → 카드 선택 단계 */
$("toShuffle").addEventListener("click", () => {
  pickTarget = selected.count;
  picks = [];
  showStep("pick");
  $("pickLabel").textContent = "🌟 카드를 섞고 있습니다...";
  $("pickHint").textContent = "";
  $("deckFan").innerHTML = "";
  setTimeout(buildDeck, 650);
});

$("restartPick").addEventListener("click", () => showStep("setup"));
$("again").addEventListener("click", () => showStep("setup"));

function showStep(which){
  stepSetup.classList.toggle("hidden", which !== "setup");
  stepPick.classList.toggle("hidden", which !== "pick");
  stepResult.classList.toggle("hidden", which !== "result");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

/* 셔플된 덱 펼치기 */
function buildDeck(){
  // 0~21 인덱스를 섞는다
  const order = shuffle([...Array(CARDS.length).keys()]);
  $("pickLabel").textContent = `🃏 마음이 끌리는 카드를 ${pickTarget}장 선택하세요`;
  updateHint();
  const fan = $("deckFan");
  fan.innerHTML = "";
  order.forEach((cardIdx, i) => {
    const c = document.createElement("div");
    c.className = "deck-card dealing";
    c.style.animationDelay = (i*0.02) + "s";
    c.dataset.idx = cardIdx;
    c.addEventListener("click", () => choose(c));
    fan.appendChild(c);
  });
}

function choose(el){
  if (el.classList.contains("chosen")) return;
  if (picks.length >= pickTarget) return;
  el.classList.add("chosen");
  // 역방향 여부를 무작위로 결정
  const reversed = Math.random() < 0.42;
  picks.push({ idx: +el.dataset.idx, reversed });
  updateHint();
  if (picks.length === pickTarget){
    setTimeout(reveal, 480);
  }
}

function updateHint(){
  const remain = pickTarget - picks.length;
  $("pickHint").textContent = remain > 0
    ? `${remain}장 더 선택해 주세요`
    : "카드를 펼치는 중...";
}

/* 결과 표시 */
function reveal(){
  const spread = SPREADS[selected.key];
  drawn = picks.map((p, i) => ({
    card: CARDS[p.idx],
    reversed: p.reversed,
    slot: spread.slots[i] || `카드 ${i+1}`,
  }));

  const q = $("question").value.trim();
  $("readQ").textContent = q ? `“${q}”` : "오늘의 타로";
  $("spreadName").textContent = spread.name;

  const wrap = $("results");
  wrap.innerHTML = "";
  drawn.forEach((d, i) => wrap.appendChild(renderCard(d, i)));

  $("summaryText").innerHTML = buildSummary(drawn);
  showStep("result");

  // 순차적으로 카드 뒤집기
  drawn.forEach((d, i) => {
    setTimeout(() => {
      const flip = document.querySelector(`.card-flip[data-i="${i}"]`);
      if (flip) flip.classList.add("flipped");
    }, 500 + i*650);
  });
}

function renderCard(d, i){
  const c = d.card;
  const wrap = document.createElement("div");
  wrap.className = "result-card fade-in";
  wrap.style.animationDelay = (i*0.12) + "s";

  const orientCls = d.reversed ? "rev" : "up";
  const orientTxt = d.reversed ? "역방향" : "정방향";
  const meaning = d.reversed ? c.rev : c.up;
  const kw = meaning.kw.map(k => `<span class="kw">${k}</span>`).join("");

  wrap.innerHTML = `
    <div class="slot-name">${d.slot}</div>
    <div class="card-flip" data-i="${i}" title="클릭하면 다시 뒤집힙니다">
      <div class="card-inner">
        <div class="card-face card-back"><div class="glyph">✶</div></div>
        <div class="card-face card-front ${d.reversed ? "reversed" : ""}">
          <img alt="${c.ko} (${c.en})" src="${img(c.file)}"
               onerror="this.closest('.card-front').classList.add('show-fallback')">
          <div class="fallback">
            <div class="f-num">${String(c.n).padStart(2,'0')}</div>
            <div class="f-glyph">${c.glyph}</div>
            <div class="f-name">${c.ko}</div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-meta">
      <div class="cn-name">${c.ko}</div>
      <div class="en-name">${c.en} · ${String(c.n).padStart(2,'0')}</div>
      <div class="orient ${orientCls}">${orientTxt}</div>
      <div class="keywords">${kw}</div>
      <div class="interp">
        <span class="ttl">해석 · ${d.slot}</span>
        ${meaning.txt}
      </div>
    </div>
  `;

  // 클릭으로 다시 뒤집기
  wrap.querySelector(".card-flip").addEventListener("click", e => {
    e.currentTarget.classList.toggle("flipped");
  });
  return wrap;
}

/* 종합 메시지 */
function buildSummary(list){
  const revCount = list.filter(d => d.reversed).length;
  const names = list.map(d => `<b style="color:var(--gold-bright)">${d.card.ko}</b>(${d.reversed?"역":"정"})`).join(" · ");

  let tone;
  if (list.length === 1){
    const d = list[0];
    tone = d.reversed
      ? "지금은 잠시 멈춰 안을 들여다보라는 신호가 강합니다. 서두르기보다 점검과 정비에 마음을 쓰면 흐름이 다시 풀립니다."
      : "흐름이 당신 편으로 향하고 있습니다. 떠오른 직감을 믿고 한 걸음 내디뎌도 좋은 시기예요.";
  } else if (revCount === 0){
    tone = "뽑힌 카드가 모두 정방향입니다. 전반적으로 기운이 순조롭게 흐르니, 망설임을 내려놓고 자신의 방향을 믿어도 좋습니다.";
  } else if (revCount === list.length){
    tone = "역방향이 많습니다. 외부의 일을 밀어붙이기보다, 내면을 정비하고 막힌 부분을 차분히 풀어가는 데 집중할 시기예요.";
  } else {
    tone = "정방향과 역방향이 섞여 있습니다. 잘 풀리는 부분은 살리고 막힌 부분은 점검하면서, 균형을 잡아가는 흐름입니다.";
  }

  return `뽑은 카드: ${names}<br><br>${tone}<br><br>
  <span style="color:var(--muted);font-size:13px">각 카드를 클릭하면 앞뒷면을 다시 확인할 수 있어요. 타로는 정해진 운명이 아니라, 지금의 마음을 비추는 거울입니다. 🔮</span>`;
}

/* Fisher–Yates 셔플 */
function shuffle(arr){
  for (let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
